name: Actualizar Precios Automático

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Instalar dependencias del scraper
      run: npm install cheerio

    - name: Correr Scraper Gratuito
      run: node scraper.js

    - name: Subir cambios a GitHub Pages
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add public/productos.json
        git commit -m "Precios actualizados automáticamente" || exit 0
        git push
