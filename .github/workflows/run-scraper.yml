name: Actualizar Precios Automático

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write  # Add this to allow writing to the repository

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}  # Explicitly use the token

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20  # Also fix: was "node-node-version"

    - name: Correr Scraper Gratuito
      run: node scraper.js

    - name: Subir cambios a GitHub Pages
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add productos.json
        git commit -m "Precios actualizados automáticamente" || exit 0
        git push
